services:
  mongodb:
    image: mongo:latest
    container_name: admin_panel_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - admin_panel_network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: admin_panel_backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/admin_panel_prod
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - admin_panel_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: admin_panel_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000/api
    depends_on:
      - backend
    networks:
      - admin_panel_network

networks:
  admin_panel_network:
    driver: bridge

volumes:
  mongodb_data:
